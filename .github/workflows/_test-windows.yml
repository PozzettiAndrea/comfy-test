name: Test Windows

on:
  workflow_call:
    inputs:
      node_repo:
        description: "owner/repo of the node to test (default: caller repo)"
        type: string
        default: ""
      node_branch:
        description: "branch of the node to test (default: caller ref)"
        type: string
        default: ""

jobs:
  windows-test:
    name: windows-test
    runs-on: windows-latest
    timeout-minutes: 300
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
      PW_TEST_SCREENSHOT_NO_FONTS_READY: "1"
      COMFY_ENV_DEBUG: "1"
      COMFY_TEST_GPU: "0"
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}\comfy-test-logs
      COMFY_TEST_WORKSPACE_DIR: ${{ github.workspace }}\test_workspaces
      COMFYUI_DIR: ${{ github.workspace }}\ComfyUI
      VENV: ${{ github.workspace }}\.venv
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.playwright
      # The install + server + test steps run under this user instead of the
      # default `runneradmin`, which is in the Administrators group and masks
      # admin-required bugs. Hardcoded password is fine: the runner VM is
      # ephemeral and `stduser` exists only inside it.
      STD_USER: stduser
      STD_PWD: "ComfyTestNoAdmin_2026!"
    steps:
      - name: Resolve target node
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.node_repo }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            echo "NODE_NAME=${INPUT_REPO##*/}" >> $GITHUB_ENV
          else
            echo "NODE_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          fi

      - name: Pick Python version
        id: python
        shell: bash
        run: |
          versions=(3.10 3.11 3.12 3.13)
          chosen=${versions[$RANDOM % ${#versions[@]}]}
          echo "version=$chosen" >> $GITHUB_OUTPUT
          echo "Picked Python $chosen"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python.outputs.version }}

      # --- Restore cache ---
      - uses: actions/cache/restore@v4
        id: setup-cache
        with:
          path: |
            ${{ env.VENV }}
            ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
            ${{ env.COMFYUI_DIR }}
          key: setup-windows-cpu-py${{ steps.python.outputs.version }}

      # --- Setup (skip if cache hit) ---
      - name: Create venv and install uv
        if: steps.setup-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          python -m venv $env:VENV
          & "$env:VENV\Scripts\pip" install uv

      - name: Clone ComfyUI
        if: steps.setup-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/comfyanonymous/ComfyUI.git ${{ env.COMFYUI_DIR }}

      - name: Install ComfyUI requirements
        if: steps.setup-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          & "$env:VENV\Scripts\uv" pip install -r "$env:COMFYUI_DIR\requirements.txt"

      - name: Install Playwright
        if: steps.setup-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          & "$env:VENV\Scripts\uv" pip install playwright
          & "$env:VENV\Scripts\python" -m playwright install chromium

      # --- Save cache ---
      - uses: actions/cache/save@v4
        if: steps.setup-cache.outputs.cache-hit != 'true'
        with:
          path: |
            ${{ env.VENV }}
            ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
            ${{ env.COMFYUI_DIR }}
          key: setup-windows-cpu-py${{ steps.python.outputs.version }}

      # --- Verify base setup ---
      - name: Verify base setup
        shell: powershell
        run: |
          $env:PATH = "$env:VENV\Scripts;C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem"
          & "$env:VENV\Scripts\python" -c "import torch; print(f'torch {torch.__version__} OK')"
          if ($LASTEXITCODE -ne 0) { Write-Host 'torch import failed'; exit 1 }
          & "$env:VENV\Scripts\python" -u "$env:COMFYUI_DIR\main.py" --quick-test-for-ci --cpu
          if ($LASTEXITCODE -ne 0) { Write-Host 'ComfyUI quick test failed'; exit 1 }

      # --- Install comfy-test (always fresh) ---
      - name: Install comfy-test
        shell: powershell
        run: |
          $version = if ($env:GITHUB_WORKFLOW_REF -match '@refs/tags/v(.+)$') { $Matches[1] } else { $null }
          if ($version) {
            & "$env:VENV\Scripts\uv" pip install "comfy-test==$version"
          } else {
            & "$env:VENV\Scripts\uv" pip install comfy-test
          }

      # --- Checkout ---
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.node_repo || github.repository }}
          ref: ${{ inputs.node_branch || github.ref }}
          token: ${{ secrets.NODE_PAT || github.token }}
          path: ${{ env.COMFYUI_DIR }}\custom_nodes\${{ env.NODE_NAME }}

      - name: Install validate endpoint
        shell: powershell
        run: |
          git clone --depth 1 https://github.com/PozzettiAndrea/ComfyUI-validate-endpoint.git "$env:COMFYUI_DIR\custom_nodes\ComfyUI-validate-endpoint"
          $true

      # --- Create non-admin user for install + server + test phases ---
      - name: Create standard user + helper
        shell: powershell
        run: |
          $pwd = ConvertTo-SecureString $env:STD_PWD -AsPlainText -Force
          New-LocalUser -Name $env:STD_USER -Password $pwd -PasswordNeverExpires -AccountNeverExpires | Out-Null
          # Explicitly NOT adding to Administrators -- this is the whole point.
          $admins = Get-LocalGroupMember -Group Administrators | Where-Object { $_.Name -like "*\$env:STD_USER" }
          if ($admins) { throw "stduser ended up in Administrators -- aborting." }
          # Grant stduser access to the workspace + hosted Python toolcache.
          icacls "${{ github.workspace }}" /grant "${env:STD_USER}:(OI)(CI)F" /T /Q | Out-Null
          icacls "$env:pythonLocation" /grant "${env:STD_USER}:(OI)(CI)RX" /T /Q | Out-Null

          # Helper: every subsequent stduser step calls this with -Command.
          # Wraps Start-Process -Credential, captures stdout/stderr, propagates
          # exit code as a thrown exception so GHA fails the step correctly.
          $helper = @'
          param([Parameter(Mandatory)][string]$Command, [switch]$Async, [string]$PidFile)
          $cred = [PSCredential]::new($env:STD_USER,
              (ConvertTo-SecureString $env:STD_PWD -AsPlainText -Force))
          $ts = [DateTime]::Now.Ticks
          $out = "$env:GITHUB_WORKSPACE\runas-$ts.out"
          $err = "$env:GITHUB_WORKSPACE\runas-$ts.err"
          $argList = @('-NoProfile','-ExecutionPolicy','Bypass','-Command',$Command)
          if ($Async) {
              $p = Start-Process powershell -Credential $cred -PassThru `
                  -WindowStyle Hidden -ArgumentList $argList `
                  -RedirectStandardOutput $out -RedirectStandardError $err
              if ($PidFile) { $p.Id | Out-File $PidFile }
              return
          }
          $p = Start-Process powershell -Credential $cred -Wait -PassThru `
              -ArgumentList $argList `
              -RedirectStandardOutput $out -RedirectStandardError $err
          Get-Content $out -ErrorAction SilentlyContinue
          $errOut = Get-Content $err -ErrorAction SilentlyContinue
          if ($errOut) { Write-Host "STDERR:`n$errOut" }
          Remove-Item $out, $err -ErrorAction SilentlyContinue
          if ($p.ExitCode -ne 0) { throw "Non-admin command failed (exit $($p.ExitCode))" }
          '@
          Set-Content -Path "${{ github.workspace }}\run-as-stduser.ps1" -Value $helper

      - name: Install node dependencies (as stduser)
        shell: powershell
        run: |
          $nodeDir = "$env:COMFYUI_DIR\custom_nodes\$env:NODE_NAME"
          $cmd = @"
          Set-Location '$nodeDir'
          if (Test-Path 'requirements.txt') {
              & '$env:VENV\Scripts\uv' pip install -r requirements.txt
              if (`$LASTEXITCODE -ne 0) { exit `$LASTEXITCODE }
          }
          if (Test-Path 'install.py') {
              & '$env:VENV\Scripts\python' install.py
              if (`$LASTEXITCODE -ne 0) { exit `$LASTEXITCODE }
          }
          exit 0
          "@
          & "${{ github.workspace }}\run-as-stduser.ps1" -Command $cmd

      # --- Start server (as stduser, background) ---
      - name: Start ComfyUI server (as stduser)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:COMFY_TEST_LOGS_DIR | Out-Null
          icacls $env:COMFY_TEST_LOGS_DIR /grant "${env:STD_USER}:(OI)(CI)F" /T /Q | Out-Null
          $cmd = @"
          Set-Location '$env:COMFYUI_DIR'
          & '$env:VENV\Scripts\python' -u main.py --listen 127.0.0.1 --port 8188 --cpu *>&1 |
              Out-File -FilePath '$env:COMFY_TEST_LOGS_DIR\server.log' -Encoding utf8
          "@
          & "${{ github.workspace }}\run-as-stduser.ps1" -Command $cmd -Async `
              -PidFile "${{ github.workspace }}\server.pid"

      - name: Wait for server
        shell: powershell
        run: |
          for ($i = 1; $i -le 300; $i++) {
              try {
                  Invoke-WebRequest -Uri http://127.0.0.1:8188/system_stats `
                      -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop | Out-Null
                  Write-Host "Server ready after ${i}s"
                  Write-Host "=== Server startup log ==="
                  Get-Content "$env:COMFY_TEST_LOGS_DIR\server.log" -ErrorAction SilentlyContinue
                  exit 0
              } catch {
                  Start-Sleep -Seconds 1
              }
          }
          Write-Host "Server failed to start"
          Get-Content "$env:COMFY_TEST_LOGS_DIR\server.log" -ErrorAction SilentlyContinue
          exit 1

      # --- Run tests (as stduser) ---
      - name: Run tests (as stduser)
        shell: powershell
        run: |
          $nodeDir = "$env:COMFYUI_DIR\custom_nodes\$env:NODE_NAME"
          $cmd = @"
          `$me = [System.Security.Principal.WindowsIdentity]::GetCurrent()
          Write-Host "[ci] running as `$(`$me.Name)"
          if (`$me.Name -notlike '*\stduser') { throw "expected stduser, got `$(`$me.Name)" }
          `$role = New-Object System.Security.Principal.WindowsPrincipal(`$me)
          if (`$role.IsInRole([System.Security.Principal.WindowsBuiltInRole]::Administrator)) {
              throw 'test step is somehow running as Administrator'
          }
          Set-Location '$nodeDir'
          & '$env:VENV\Scripts\python' -m comfy_test run --server-url http://127.0.0.1:8188 --level execution
          exit `$LASTEXITCODE
          "@
          & "${{ github.workspace }}\run-as-stduser.ps1" -Command $cmd

      # --- Cleanup ---
      - name: Stop server
        if: always()
        shell: powershell
        run: |
          $pidFile = "${{ github.workspace }}\server.pid"
          if (Test-Path $pidFile) {
              $serverPid = (Get-Content $pidFile).Trim()
              if ($serverPid) { Stop-Process -Id $serverPid -Force -ErrorAction SilentlyContinue }
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-windows-cpu
          path: ${{ env.COMFY_TEST_LOGS_DIR }}/
          if-no-files-found: ignore
          include-hidden-files: true
