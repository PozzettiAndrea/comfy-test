name: Test macOS Desktop

on:
  workflow_call:
    inputs:
      node_repo:
        description: "owner/repo of the node to test"
        type: string
        required: true
      node_branch:
        type: string
        default: "main"
      runs_on:
        type: string
        default: "macos-latest"

jobs:
  macos-desktop-test:
    name: macos-desktop-test
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      COMFY_TEST_GPU: "0"
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}/comfy-test-logs
    steps:

      - name: Resolve target node
        env:
          INPUT_REPO: ${{ inputs.node_repo }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            echo "NODE_NAME=${INPUT_REPO##*/}" >> $GITHUB_ENV
          else
            echo "NODE_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          fi
          mkdir -p "$COMFY_TEST_LOGS_DIR"

      # --- Download and install desktop app ---
      - name: Download ComfyUI Desktop
        run: |
          curl -L --retry 3 -o ComfyUI.dmg "https://download.comfy.org/mac/dmg/arm64"
          # DMG mount path includes the version suffix (e.g. "ComfyUI 0.8.36-arm64"),
          # which varies per release. Use a glob to match whatever it is.
          hdiutil attach -nobrowse ComfyUI.dmg
          cp -R /Volumes/ComfyUI*/ComfyUI.app "${{ github.workspace }}/ComfyUI.app"
          hdiutil detach /Volumes/ComfyUI* || true
          rm ComfyUI.dmg

      # We don't run a desktop-wide screencapture loop on macOS:
      # `screencapture` requires Screen Recording (TCC) permission, which
      # presents a native modal "bash wants to access your screen" dialog
      # that CDP can't click. The Electron renderer frames captured by the
      # CDP driver give us the wizard view we actually need.

      # .venv caching disabled — see windows workflow comment.

      # --- First boot: launch app + drive maintenance UI via CDP if needed ---
      # Same idea as windows-desktop: attach Playwright via CDP, click through
      # the Maintenance page (Recreate → wait → Continue), capture renderer
      # frames at 5fps, ffmpeg-assemble into driver.mp4.
      - name: First boot (CDP-driven)
        run: |
          OUT="$COMFY_TEST_LOGS_DIR/electron_inspect"
          mkdir -p "$OUT/frames"

          cat > /tmp/cdp_driver.py <<'PY'
          import json, os, subprocess, sys, time, urllib.request
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          t0 = time.time()
          import builtins as _b
          def log(*a, **k):
              _b.print(f'[{int(time.time()-t0):4d}s]', *a, **k, flush=True)

          OUT = Path(os.environ['COMFY_TEST_LOGS_DIR']) / 'electron_inspect'
          FRAMES = OUT / 'frames'
          OUT.mkdir(parents=True, exist_ok=True)
          FRAMES.mkdir(parents=True, exist_ok=True)
          fi = [0]

          def snap(page, name):
              try:
                  page.screenshot(path=str(OUT / f'{name}.png'), full_page=True)
                  (OUT / f'{name}.html').write_text(page.content(), encoding='utf-8')
              except Exception as e:
                  log(f'  snap {name}: {e}')

          def frame(page):
              try:
                  fi[0] += 1
                  page.screenshot(path=str(FRAMES / f'frame_{fi[0]:06d}.png'))
              except Exception:
                  pass

          def sleep_capturing(page, seconds, fps=5):
              interval = 1.0 / fps
              end = time.time() + seconds
              while time.time() < end:
                  frame(page)
                  time.sleep(interval)

          def buttons(page):
              try:
                  return page.eval_on_selector_all(
                      'button, a[role=button], [role=button], input[type=submit], input[type=button]',
                      "els => els.map(e => ({text:(e.innerText||e.value||'').trim(), tag:e.tagName, id:e.id, cls:e.className, disabled:!!(e.disabled||e.getAttribute('aria-disabled')==='true'||e.getAttribute('disabled')!==null)}))"
                  )
              except Exception:
                  return []

          def main_page(browser):
              cands = []
              for ctx in browser.contexts:
                  for pg in ctx.pages:
                      try:
                          u = pg.url or ''
                          if u.startswith('devtools://'):
                              continue
                          t = pg.title()
                      except Exception:
                          continue
                      cands.append((pg, u, t))
              for pg, u, t in cands:
                  if any(k in (t or '') for k in ('ComfyUI', 'Maintenance')) or 'maintenance' in (u or '').lower():
                      return pg
              return cands[0][0] if cands else None

          try:
              tg = json.loads(urllib.request.urlopen('http://localhost:9222/json').read())
              (OUT / 'targets.json').write_text(json.dumps(tg, indent=2))
              log(f'CDP targets: {len(tg)}')
              for t in tg:
                  log(f"  {t.get('type')}: {t.get('url')} | {t.get('title')}")
          except Exception as e:
              log(f'targets list: {e}')

          # Visible cursor injected into the page so the captured video shows
          # where the driver clicks. The CSS transform transitions over 300ms,
          # so move-then-wait-then-click looks like a smooth pointer move.
          CURSOR_JS = r'''
          (() => {
            if (document.getElementById('__fake_cursor')) return;
            const c = document.createElement('div');
            c.id = '__fake_cursor';
            c.style.cssText = [
              'position:fixed','top:0','left:0','width:28px','height:28px',
              'pointer-events:none','z-index:2147483647',
              'transition:transform 300ms cubic-bezier(.4,0,.2,1),filter 120ms',
              'transform:translate(40px,40px)',
              "background:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 2 L3 19 L8 14 L11 21 L14 20 L11 13 L18 13 Z' fill='black' stroke='white' stroke-width='1.5'/></svg>\") no-repeat center / contain"
            ].join(';');
            document.documentElement.appendChild(c);
            window.__moveCursor = (x, y) => { c.style.transform = `translate(${x}px,${y}px)`; };
            window.__clickFlash  = () => { c.style.filter = 'drop-shadow(0 0 8px #4af) brightness(1.4)'; setTimeout(()=>c.style.filter='',180); };
          })();
          '''

          def install_cursor(page):
              try:
                  page.evaluate(CURSOR_JS)
              except Exception as e:
                  log(f'  cursor inject failed: {e}')

          def click_with_cursor(page, loc):
              try:
                  box = loc.bounding_box()
                  if box:
                      cx = box['x'] + box['width']/2
                      cy = box['y'] + box['height']/2
                      page.evaluate(f'window.__moveCursor && window.__moveCursor({cx}, {cy})')
                      time.sleep(0.4)
                      page.evaluate('window.__clickFlash && window.__clickFlash()')
              except Exception:
                  pass
              loc.click(timeout=3000)

          def fill_with_cursor(page, sel, text):
              loc = page.locator(sel).first
              if not loc.count() or not loc.is_visible():
                  return False
              try:
                  box = loc.bounding_box()
                  if box:
                      cx = box['x'] + box['width']/2
                      cy = box['y'] + box['height']/2
                      page.evaluate(f'window.__moveCursor && window.__moveCursor({cx}, {cy})')
                      time.sleep(0.4)
              except Exception:
                  pass
              try:
                  loc.click(timeout=3000)
                  loc.fill('')
                  loc.type(text, delay=80)
                  return True
              except Exception:
                  return False

          with sync_playwright() as p:
              browser = p.chromium.connect_over_cdp('http://localhost:9222')
              page = main_page(browser)
              if not page:
                  log('No usable page')
                  sys.exit(0)
              log(f'Main page: {page.url} | {page.title()}')
              install_cursor(page)
              snap(page, 'initial')
              btns = buttons(page)
              (OUT / 'initial_buttons.json').write_text(json.dumps(btns, indent=2))
              log(f"Buttons: {[b['text'] for b in btns]}")
              frame(page)

              PRIMARY_LABELS = ['Get Started', 'Next', 'Continue', 'Install', 'OK',
                                'Recreate', 'Confirm', 'Accept', 'Allow', 'Yes', 'Finish']

              def server_up():
                  try:
                      urllib.request.urlopen('http://127.0.0.1:8000/system_stats', timeout=2)
                      return True
                  except Exception:
                      return False

              def find_action(page):
                  try:
                      loc = page.locator('button.p-confirmpopup-accept-button').first
                      if loc.count() and loc.is_visible():
                          return ('confirm', loc, f'CONFIRM|{(loc.text_content() or "").strip()}')
                  except Exception:
                      pass
                  for label in PRIMARY_LABELS:
                      for sel in (f'button.p-button-raised:text-is("{label}")',
                                  f'button:not(.hardware-option):text-is("{label}")',
                                  f'button[aria-label="{label}"]:not(.hardware-option)'):
                          try:
                              loc = page.locator(sel).first
                              if loc.count() and loc.is_visible() and not loc.is_disabled():
                                  return ('btn', loc, f'BTN|{label}')
                          except Exception:
                              pass
                  try:
                      tile = page.locator('button.hardware-option:not([aria-disabled="true"])').first
                      if tile.count() and tile.is_visible():
                          name = (tile.get_attribute('aria-label') or tile.text_content() or 'tile').strip()[:40]
                          return ('tile', tile, f'TILE|{name}')
                  except Exception:
                      pass
                  return None

              clicked = {}
              CLICK_TTL = 5
              page_url = page.url
              start = time.time()
              deadline = start + 1500
              while time.time() < deadline:
                  frame(page)
                  if server_up():
                      log(f'  /system_stats up after {int(time.time()-start)}s')
                      break
                  new_url = page.url
                  if new_url != page_url:
                      log(f'  url: {page_url} -> {new_url}')
                      page_url = new_url
                      clicked.clear()
                      install_cursor(page)
                  found = find_action(page)
                  if found:
                      kind, loc, sig = found
                      last_t = clicked.get(sig, 0)
                      if time.time() - last_t < CLICK_TTL:
                          time.sleep(1); continue
                      try:
                          click_with_cursor(page, loc)
                          log(f'  clicked [{sig}]')
                          clicked[sig] = time.time()
                          sleep_capturing(page, 1, fps=4)
                      except Exception as e:
                          log(f'  click [{sig}] failed: {e}')
                          clicked[sig] = time.time()
                  else:
                      time.sleep(2)
              else:
                  log(f'  driver timed out after {int(time.time()-start)}s without /system_stats')

              log('  capturing canvas load...')
              sleep_capturing(page, 8, fps=5)
              POST_ACTIONS = [
                  ('Continue Locally',  'button:has-text("Continue Locally"):visible'),
                  ('Close Templates',   'button[aria-label="Close"]:visible'),
                  ('Extensions',        'button[aria-label="Extensions"]:visible'),
              ]
              for name, sel in POST_ACTIONS:
                  log(f'  post: waiting for {name}')
                  deadline = time.time() + 8
                  hit = False
                  while time.time() < deadline:
                      try:
                          loc = page.locator(sel).first
                          if loc.count() and loc.is_visible() and not loc.is_disabled():
                              click_with_cursor(page, loc)
                              log(f'  post: clicked {name}')
                              sleep_capturing(page, 2, fps=5)
                              hit = True
                              break
                      except Exception:
                          pass
                      sleep_capturing(page, 0.5, fps=5)
                  if not hit:
                      log(f'  post: {name} not found, skipping')
                      if name == 'Close Templates':
                          try:
                              page.keyboard.press('Escape')
                              log('  post: pressed Escape (Templates fallback)')
                              sleep_capturing(page, 2, fps=5)
                          except Exception:
                              pass

              NODE_DISPLAY_NAME = 'SAM3'
              PUBLISHER = 'pznodes'
              sleep_capturing(page, 3, fps=5)
              log(f'  ext: searching "{NODE_DISPLAY_NAME}"')
              fill_with_cursor(page, 'input[placeholder="Search"]:visible', NODE_DISPLAY_NAME)
              sleep_capturing(page, 2, fps=5)

              log(f'  ext: clicking {NODE_DISPLAY_NAME} by {PUBLISHER} tile')
              tile_sel = (f'div.bg-modal-card-background.cursor-pointer'
                          f':has-text("{NODE_DISPLAY_NAME}")'
                          f':has-text("{PUBLISHER}"):visible')
              deadline = time.time() + 8
              clicked_tile = False
              while time.time() < deadline:
                  try:
                      tile = page.locator(tile_sel).first
                      if tile.count() and tile.is_visible():
                          click_with_cursor(page, tile)
                          clicked_tile = True
                          break
                  except Exception:
                      pass
                  sleep_capturing(page, 0.5, fps=5)
              if not clicked_tile:
                  log('  ext: tile not found, ending capture')
              else:
                  sleep_capturing(page, 3, fps=5)

                  log('  ext: scrolling to + opening version selector')
                  try:
                      vt = page.locator('div[role="button"][aria-haspopup="true"].bg-dialog-surface:visible').first
                      if vt.count():
                          vt.scroll_into_view_if_needed()
                          sleep_capturing(page, 1, fps=5)
                          click_with_cursor(page, vt)
                          sleep_capturing(page, 1, fps=5)
                          picked = False
                          for label in ('0.1.10', 'Latest', 'Nightly'):
                              try:
                                  opt = page.locator(
                                      f'[role="option"]:has-text("{label}"):visible, '
                                      f'[role="menuitem"]:has-text("{label}"):visible, '
                                      f'li:has-text("{label}"):visible').first
                                  if opt.count():
                                      click_with_cursor(page, opt)
                                      log(f'  ext: selected {label}')
                                      sleep_capturing(page, 1, fps=5)
                                      picked = True
                                      break
                              except Exception:
                                  pass
                          if not picked:
                              log('  ext: no version option matched, dismissing')
                              try: page.keyboard.press('Escape')
                              except Exception: pass
                  except Exception as e:
                      log(f'  ext: version selector failed: {e}')

                  log('  ext: clicking right-panel Install')
                  try:
                      btns = page.locator('button:has-text("Install"):visible')
                      n = btns.count()
                      if n:
                          btn = btns.nth(n - 1)
                          btn.scroll_into_view_if_needed()
                          sleep_capturing(page, 1, fps=5)
                          click_with_cursor(page, btn)
                          log(f'  ext: clicked Install (last of {n} visible)')
                      else:
                          log('  ext: no visible Install button')
                  except Exception as e:
                      log(f'  ext: install click failed: {e}')
                  sleep_capturing(page, 8, fps=5)

                  log('  ext: waiting for "Apply Changes" toast')
                  applied = False
                  deadline = time.time() + 20
                  while time.time() < deadline:
                      try:
                          ac = page.locator('button:has-text("Apply Changes"):visible').first
                          if ac.count() and ac.is_visible() and not ac.is_disabled():
                              click_with_cursor(page, ac)
                              log('  ext: clicked Apply Changes')
                              applied = True
                              break
                      except Exception:
                          pass
                      sleep_capturing(page, 1, fps=5)
                  if not applied:
                      log('  ext: Apply Changes toast not seen, skipping')
                  sleep_capturing(page, 20, fps=5)

                  log('  ext: closing Nodes Manager dialog')
                  try:
                      cd = page.locator('button[aria-label="Close dialog"]:visible').first
                      if cd.count():
                          click_with_cursor(page, cd)
                          log('  ext: clicked Close dialog')
                          sleep_capturing(page, 2, fps=5)
                  except Exception as e:
                      log(f'  ext: Close dialog failed: {e}')

                  log("  ext: dismissing What's New popup")
                  try:
                      wn = page.locator('.whats-new-popup button[aria-label="Close"]:visible, .whats-new-popup button.close-button:visible').first
                      if wn.count():
                          click_with_cursor(page, wn)
                          log("  ext: closed What's New popup")
                          sleep_capturing(page, 2, fps=5)
                      else:
                          log("  ext: What's New popup not present")
                  except Exception as e:
                      log(f"  ext: What's New close failed: {e}")

                  log('  ext: opening Templates sidebar')
                  try:
                      tpl = page.locator('button[aria-label="Templates"]:visible').first
                      if tpl.count():
                          click_with_cursor(page, tpl)
                          log('  ext: clicked Templates')
                          sleep_capturing(page, 4, fps=5)
                      else:
                          log('  ext: Templates sidebar button not found')
                  except Exception as e:
                      log(f'  ext: Templates click failed: {e}')

                  NODE_PACKAGE_NAME = os.environ.get('NODE_NAME', 'comfyui-sam3').lower()
                  log(f'  ext: locating "{NODE_PACKAGE_NAME}" section in Templates panel')
                  node_section = None
                  try:
                      candidates = [
                          f'aside [role="button"]:has-text("{NODE_PACKAGE_NAME}"):visible',
                          f'aside button:has-text("{NODE_PACKAGE_NAME}"):visible',
                          f'aside h2:has-text("{NODE_PACKAGE_NAME}"):visible',
                          f'aside h3:has-text("{NODE_PACKAGE_NAME}"):visible',
                          f'aside [class*="accordion"]:has-text("{NODE_PACKAGE_NAME}"):visible',
                      ]
                      for sel in candidates:
                          loc = page.locator(sel).first
                          if loc.count():
                              loc.scroll_into_view_if_needed()
                              sleep_capturing(page, 1, fps=5)
                              click_with_cursor(page, loc)
                              log(f'  ext: clicked {NODE_PACKAGE_NAME} section ({sel})')
                              node_section = loc
                              sleep_capturing(page, 2, fps=5)
                              break
                      if node_section is None:
                          log(f'  ext: {NODE_PACKAGE_NAME} section not found in Templates panel')
                  except Exception as e:
                      log(f'  ext: {NODE_PACKAGE_NAME} section click failed: {e}')

                  if node_section is not None:
                      log(f'  ext: opening first {NODE_PACKAGE_NAME} template')
                      try:
                          card_candidates = [
                              'aside [class*="template-card"]:visible',
                              'aside [class*="workflow-card"]:visible',
                              'aside .cursor-pointer img:visible',
                              'aside .cursor-pointer:visible',
                          ]
                          tpl_card = None
                          for sel in card_candidates:
                              cards = page.locator(sel)
                              if cards.count():
                                  tpl_card = cards.first
                                  log(f'  ext: found template via {sel}')
                                  break
                          if tpl_card is not None:
                              tpl_card.scroll_into_view_if_needed()
                              sleep_capturing(page, 1, fps=5)
                              click_with_cursor(page, tpl_card)
                              log('  ext: clicked first template')
                              sleep_capturing(page, 4, fps=5)
                      except Exception as e:
                          log(f'  ext: template click failed: {e}')

                      log('  ext: clicking Run')
                      try:
                          run_btn = page.locator(
                              'button[aria-label="Run"]:visible, '
                              'button:has-text("Run"):visible'
                          ).first
                          if run_btn.count():
                              click_with_cursor(page, run_btn)
                              log('  ext: clicked Run')
                              sleep_capturing(page, 30, fps=5)
                          else:
                              log('  ext: Run button not found')
                      except Exception as e:
                          log(f'  ext: Run click failed: {e}')

              snap(page, 'final')
              log(f'Captured {fi[0]} frames')
              browser.close()

          try:
              import imageio_ffmpeg
              ffmpeg_exe = imageio_ffmpeg.get_ffmpeg_exe()
          except Exception as e:
              log(f'imageio-ffmpeg unavailable ({e}); falling back to PATH ffmpeg')
              ffmpeg_exe = 'ffmpeg'

          mp4 = OUT / 'driver.mp4'
          try:
              subprocess.run([
                  ffmpeg_exe, '-y', '-framerate', '5',
                  '-i', str(FRAMES / 'frame_%06d.png'),
                  '-c:v', 'libx264', '-pix_fmt', 'yuv420p',
                  '-vf', 'pad=ceil(iw/2)*2:ceil(ih/2)*2',
                  str(mp4),
              ], check=True)
              log(f'Wrote {mp4}')
          except Exception as e:
              log(f'ffmpeg failed: {e}')
          PY

          # Launch the .app with CDP enabled. `open --args` forwards flags to argv.
          open "${{ github.workspace }}/ComfyUI.app" --args --remote-debugging-port=9222
          echo "App launched with CDP on :9222"

          SHORT=""
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              SHORT=server; break
            fi
            if curl -s http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              SHORT=cdp; break
            fi
            sleep 1
          done
          echo "Phase 1 outcome: ${SHORT:-neither}"

          if [ "$SHORT" = "cdp" ]; then
            # macOS Homebrew Python is PEP 668 externally-managed; --break-system-packages
            # is fine in CI since the runner is thrown away after the job.
            pip3 install --break-system-packages --quiet playwright imageio-ffmpeg
            python3 /tmp/cdp_driver.py || echo "CDP driver had errors; continuing"
          fi

          echo "Polling /system_stats up to 15min..."
          for i in $(seq 1 900); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if [ $((i % 30)) -eq 0 ]; then echo "still polling... ${i}s"; fi
            sleep 1
          done
          echo "Server failed to start within 15min"
          cat "$HOME/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -80 || true
          exit 1

      # --- Install node via ComfyUI Manager CLI ---
      # comfyui_manager imports `from comfy.cli_args import args` at module
      # load. The `comfy` source package isn't in the venv — it lives in the
      # bundled app at .../Resources/ComfyUI/. The desktop app puts that on
      # PYTHONPATH at launch; running cm_cli standalone has to do the same.
      - name: Install custom node via Manager
        if: false  # disabled while we iterate on the wizard click-through demo
        run: |
          export PYTHONPATH="${{ github.workspace }}/ComfyUI.app/Contents/Resources/ComfyUI:$PYTHONPATH"
          VENV="$HOME/Documents/ComfyUI/.venv/bin/python"
          echo "Using Python: $VENV  PYTHONPATH=$PYTHONPATH"
          $VENV --version
          $VENV -m comfyui_manager.cm_cli install \
            "https://github.com/${{ inputs.node_repo }}.git"

      # --- Restart app for node to load ---
      - name: Restart app
        if: false
        run: |
          pkill -f "ComfyUI" || true
          sleep 5
          open "${{ github.workspace }}/ComfyUI.app"
          echo "Waiting for server after restart..."
          for i in $(seq 1 180); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after restart (${i}s)"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/system_stats || {
            echo "Server failed to start after restart"
            cat "$HOME/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -50
            exit 1
          }

      # --- Install comfy-test and run ---
      - name: Install comfy-test
        if: false
        run: |
          # macOS ships BSD grep without -P; use bash parameter expansion.
          VERSION="${GITHUB_WORKFLOW_REF##*@refs/tags/v}"
          if [ "$VERSION" = "$GITHUB_WORKFLOW_REF" ]; then VERSION=""; fi
          if [ -n "$VERSION" ]; then
            pip3 install --upgrade "comfy-test==$VERSION"
          else
            pip3 install --upgrade comfy-test
          fi

      - name: Run tests
        if: false
        working-directory: ${{ github.workspace }}
        run: |
          # Clone node source for workflow files
          git clone --depth 1 -b ${{ inputs.node_branch }} \
            "https://github.com/${{ inputs.node_repo }}.git" node_source
          cd node_source
          python3 -m comfy_test run --server-url http://127.0.0.1:8000 --level execution

      # --- Cleanup ---
      - name: Finalize "system" card from latest CDP frame
        if: always()
        run: |
          # System-card thumbnail comes from the last renderer frame the CDP
          # driver captured. _render_workflow_cards looks up screenshots/{stem}_executed.png.
          LATEST=$(ls -1t "$COMFY_TEST_LOGS_DIR/electron_inspect/frames/"*.png 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            mkdir -p "$COMFY_TEST_LOGS_DIR/screenshots"
            cp "$LATEST" "$COMFY_TEST_LOGS_DIR/screenshots/system_executed.png"
          fi
          # Synthetic "system" workflow so the HTML report renders a card.
          python3 - <<'PY' || true
          import json, os, pathlib
          p = pathlib.Path(os.environ["COMFY_TEST_LOGS_DIR"]) / "results.json"
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          data.setdefault("workflows", []).insert(0, {
              "name": "system", "status": "pass",
              "duration_seconds": 0, "error": None,
              "hardware": data.get("hardware"),
          })
          p.write_text(json.dumps(data, indent=2))
          PY

      - name: Stop app
        if: always()
        run: pkill -f "ComfyUI" || true

      - name: Collect ComfyUI app log
        if: always()
        run: |
          # Electron splits logs across Documents/ComfyUI/user/ (server stdout)
          # and ~/Library/Logs/ComfyUI/ (main/renderer process). Grab them all
          # under comfy_logs/ — we want the Install-button stdout in particular.
          DEST="$COMFY_TEST_LOGS_DIR/comfy_logs"
          mkdir -p "$DEST"
          for d in \
            "$HOME/Documents/ComfyUI/user" \
            "$HOME/Library/Logs/ComfyUI" \
            "$HOME/Library/Application Support/ComfyUI/logs"; do
            if [ -d "$d" ]; then
              find "$d" -maxdepth 2 -type f -name "*.log" -exec cp -v {} "$DEST/" \; 2>/dev/null || true
            fi
          done
          echo "--- collected ---"
          ls -la "$DEST" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-macos-desktop
          path: ${{ env.COMFY_TEST_LOGS_DIR }}/
          if-no-files-found: ignore
          include-hidden-files: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-macos-desktop
          path: ${{ github.workspace }}/test-logs/
          if-no-files-found: ignore
