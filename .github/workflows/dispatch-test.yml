name: comfy-test dispatch
#
# Single reusable workflow for every platform comfy-test supports.
#
# Calling pattern (pin to a tag, never @main):
#
#   uses: PozzettiAndrea/comfy-test/.github/workflows/dispatch-test.yml@vX.Y.Z
#   with:
#     node_repo: PozzettiAndrea/ComfyUI-SAM3
#     branch: dev
#     platform: linux-cpu | linux-gpu | windows-cpu | windows-gpu | windows-portable-cpu | windows-portable-gpu | macos-cpu | windows-desktop | windows-desktop-gpu | macos-desktop
#   secrets:
#     NODE_PAT: ${{ secrets.NODE_PAT }}
#
# Architecture: comfy-test (the Python package) does the heavy lifting in all
# three test jobs (it clones the node, sets up its own venv + uv, clones
# ComfyUI, installs deps, runs ComfyUI's server, drives tests, writes
# results). The test jobs only upload the results as an artifact. A separate
# `publish` job downloads that artifact and pushes to gh-pages -- so a flaky
# publish can be re-run by itself without re-running the (slow) test job.
#
# COMFY_TEST_VERSION is pinned in lockstep with this workflow's git tag:
# tagging vX.Y.Z bumps both the YAML and the value below, so dispatch-test.yml
# at @vX.Y.Z always installs comfy-test==X.Y.Z. Avoids the PyPI CDN
# propagation race where a freshly-published tag isn't yet visible to runners
# that hit a stale CDN edge.

on:
  workflow_call:
    inputs:
      node_repo:
        description: "owner/repo of the node to test"
        required: true
        type: string
      branch:
        description: "node branch"
        type: string
        default: dev
      platform:
        description: "linux-cpu | linux-gpu | windows-cpu | windows-gpu | windows-portable-cpu | windows-portable-gpu | macos-cpu | windows-desktop | windows-desktop-gpu | macos-desktop"
        required: true
        type: string
    secrets:
      NODE_PAT:
        required: false

env:
  # Bump in lockstep with the v0.3.X tag this YAML lives at.
  COMFY_TEST_VERSION: "0.3.73"

jobs:
  # =========================================================================
  # CPU on hosted runners (linux-cpu, windows-cpu, windows-portable-cpu, macos-cpu)
  # =========================================================================
  cpu:
    if: ${{ !contains(inputs.platform, 'gpu') && !contains(inputs.platform, 'desktop') }}
    name: ${{ inputs.platform }}
    runs-on: >-
      ${{ (startsWith(inputs.platform, 'linux') && 'ubuntu-latest')
          || (startsWith(inputs.platform, 'macos') && 'macos-latest')
          || 'windows-latest' }}
    timeout-minutes: 300
    env:
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}/comfy-test-logs
      COMFY_TEST_WORKSPACE_DIR: ${{ github.workspace }}/test_workspaces
      # Without this, comfy-test's stdout block-buffers (CI step is a pipe,
      # not a TTY), so [desktop]/[comfy-test] prints are invisible until
      # process exit.
      PYTHONUNBUFFERED: "1"
      # Speed up pip/uv installs by skipping per-file .pyc compilation
      # (slows install, never read in one-shot CI runs) and by hard-linking
      # files from the uv cache instead of copying (massive win on Windows
      # NTFS for thousands-of-small-files torch + chromium installs).
      PIP_NO_COMPILE: "1"
      UV_COMPILE_BYTECODE: "0"
      UV_LINK_MODE: hardlink
    steps:
      - name: Tune Windows runner for IO-heavy installs
        # Beyond just disabling Defender realtime: also turn off scanning
        # passes that hit on every file write (archive/script/network/IOAV/
        # behavior), set process exclusions for the Python+Node+Electron
        # exes we spawn, set path exclusions for the venvs and pip/uv
        # caches, enable long paths, and exit 0 so individual cmdlet
        # failures don't fail the step.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Try-Run($cmd) { try { & $cmd } catch { Write-Host "  (skip) $($_.Exception.Message)" } }
          Try-Run { Set-MpPreference -DisableRealtimeMonitoring $true }
          Try-Run { Set-MpPreference -DisableArchiveScanning $true }
          Try-Run { Set-MpPreference -DisableScriptScanning $true }
          Try-Run { Set-MpPreference -DisableScanningNetworkFiles $true }
          Try-Run { Set-MpPreference -DisableIOAVProtection $true }
          Try-Run { Set-MpPreference -DisableBehaviorMonitoring $true }
          Try-Run { Set-MpPreference -MAPSReporting 0 }
          Try-Run { Add-MpPreference -ExclusionProcess @('python.exe','pip.exe','uv.exe','node.exe','ComfyUI.exe') }
          Try-Run { Add-MpPreference -ExclusionPath @(
              "$env:USERPROFILE\Documents\ComfyUI",
              "$env:USERPROFILE\.comfy-test-cache",
              "$env:LOCALAPPDATA\pip\Cache",
              "$env:LOCALAPPDATA\uv\cache",
              "${{ github.workspace }}"
          ) }
          # Long-path support so deep node_modules / pixi env paths don't trip MAX_PATH.
          Try-Run { New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name LongPathsEnabled -Value 1 -PropertyType DWORD -Force | Out-Null }
          exit 0

      - name: Pick Python version
        id: python
        shell: bash
        run: |
          versions=(3.10 3.11 3.12 3.13)
          chosen=${versions[$RANDOM % ${#versions[@]}]}
          echo "version=$chosen" >> $GITHUB_OUTPUT
          echo "Picked Python $chosen"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python.outputs.version }}

      - name: Install comfy-test
        shell: bash
        run: pip install "comfy-test==${COMFY_TEST_VERSION}"

      - name: Run tests
        shell: bash
        run: |
          PORTABLE_FLAG=""
          if [[ "${{ inputs.platform }}" == *portable* ]]; then PORTABLE_FLAG="--portable"; fi
          comfy-test run "https://github.com/${{ inputs.node_repo }}.git" \
            --branch "${{ inputs.branch }}" \
            $PORTABLE_FLAG

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.platform }}
          path: ${{ env.COMFY_TEST_LOGS_DIR }}/
          if-no-files-found: ignore
          include-hidden-files: true

  # =========================================================================
  # GPU on self-hosted cluster runners (linux-gpu, windows-gpu, windows-portable-gpu)
  # =========================================================================
  gpu:
    if: ${{ contains(inputs.platform, 'gpu') && !contains(inputs.platform, 'desktop') }}
    name: ${{ inputs.platform }}
    runs-on: >-
      ${{ contains(inputs.platform, 'linux')
          && fromJson('["self-hosted","linux","cuda"]')
          || fromJson('["self-hosted","windows","cuda"]') }}
    timeout-minutes: 300
    env:
      # Where the publish job will look. We cp results from the docker logs
      # dir here after the run so the artifact contains them.
      COMFY_TEST_LOGS_DIR: ${{ runner.temp }}/comfy-test-logs
    steps:
      - name: Pick Python version
        id: python
        shell: bash
        run: |
          versions=(3.10 3.11 3.12 3.13)
          chosen=${versions[$RANDOM % ${#versions[@]}]}
          echo "version=$chosen" >> $GITHUB_OUTPUT
          echo "Picked Python $chosen (forwarded into container via COMFY_TEST_PYTHON_VERSION)"

      - name: Install comfy-test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo pip install --break-system-packages "comfy-test==${COMFY_TEST_VERSION}"
          else
            pip install "comfy-test==${COMFY_TEST_VERSION}"
          fi

      - name: Run docker test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          COMFY_TEST_PYTHON_VERSION: ${{ steps.python.outputs.version }}
        run: |
          PORTABLE_FLAG=""
          if [[ "${{ inputs.platform }}" == *portable* ]]; then PORTABLE_FLAG="--portable"; fi
          sudo -E comfy-test docker run "https://github.com/${{ inputs.node_repo }}.git" \
            --branch "${{ inputs.branch }}" --gpu $PORTABLE_FLAG

      - name: Run docker test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          COMFY_TEST_PYTHON_VERSION: ${{ steps.python.outputs.version }}
        run: |
          set "PORTABLE_FLAG="
          if /I "${{ inputs.platform }}"=="windows-portable-gpu" set "PORTABLE_FLAG=--portable"
          comfy-test docker run "https://github.com/${{ inputs.node_repo }}.git" --branch "${{ inputs.branch }}" --gpu %PORTABLE_FLAG%

      # Stage docker results into COMFY_TEST_LOGS_DIR so the artifact upload
      # (and downstream publish job) can find them with the same find -path
      # glob the cpu / desktop jobs use.
      - name: Stage results (Linux)
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "$COMFY_TEST_LOGS_DIR"
          LOGS_BASE="${COMFY_TEST_DOCKER_ROOT:-$HOME/.comfy-test/docker}/logs"
          NODE_BASE="${{ inputs.node_repo }}"; SHORT_NAME="${NODE_BASE##*/}"; SHORT_NAME="${SHORT_NAME#ComfyUI-}"
          # Latest run dir matching <SHORT>-<HHMM>
          LATEST=$(find "$LOGS_BASE" -maxdepth 1 -type d -name "${SHORT_NAME}-*" 2>/dev/null | sort | tail -1)
          if [ -n "$LATEST" ]; then
            sudo cp -r "$LATEST" "$COMFY_TEST_LOGS_DIR/"
            sudo chown -R "$USER" "$COMFY_TEST_LOGS_DIR"
            echo "Staged $LATEST -> $COMFY_TEST_LOGS_DIR"
          else
            echo "No <SHORT_NAME>-* dir found under $LOGS_BASE"
          fi

      - name: Stage results (Windows)
        if: always() && runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "%COMFY_TEST_LOGS_DIR%" mkdir "%COMFY_TEST_LOGS_DIR%"
          set "LOGS_BASE=%COMFY_TEST_DOCKER_ROOT%\logs"
          if "%COMFY_TEST_DOCKER_ROOT%"=="" set "LOGS_BASE=D:\docker\logs"
          set "NODE_REPO_INPUT=${{ inputs.node_repo }}"
          for /f "tokens=2 delims=/" %%a in ("%NODE_REPO_INPUT%") do set "NODE_BASE=%%a"
          set "SHORT_NAME=%NODE_BASE:ComfyUI-=%"
          set "LATEST="
          for /f "delims=" %%d in ('dir "%LOGS_BASE%\%SHORT_NAME%-*" /b /ad /o-d 2^>nul') do (
            if not defined LATEST set "LATEST=%%d"
          )
          if defined LATEST (
            xcopy "%LOGS_BASE%\%LATEST%" "%COMFY_TEST_LOGS_DIR%\%LATEST%\" /E /I /Q /Y
            echo Staged %LOGS_BASE%\%LATEST% -^> %COMFY_TEST_LOGS_DIR%
          ) else (
            echo No matching run dir found under %LOGS_BASE%
          )

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.platform }}
          path: ${{ env.COMFY_TEST_LOGS_DIR }}/
          if-no-files-found: ignore

  # =========================================================================
  # Desktop (macos-desktop, windows-desktop, windows-desktop-gpu) -- drives
  # ComfyUI Desktop (Electron + Chromium + CDP) on hosted runners. No docker.
  # =========================================================================
  desktop:
    if: ${{ contains(inputs.platform, 'desktop') }}
    name: ${{ inputs.platform }}
    runs-on: >-
      ${{ startsWith(inputs.platform, 'macos') && 'macos-latest' || 'windows-latest' }}
    timeout-minutes: 300
    env:
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}/comfy-test-logs
      COMFY_TEST_WORKSPACE_DIR: ${{ github.workspace }}/test_workspaces
      PYTHONUNBUFFERED: "1"
      # Speed up pip/uv installs by skipping per-file .pyc compilation
      # (slows install, never read in one-shot CI runs) and by hard-linking
      # files from the uv cache instead of copying (massive win on Windows
      # NTFS for thousands-of-small-files torch + chromium installs).
      PIP_NO_COMPILE: "1"
      UV_COMPILE_BYTECODE: "0"
      UV_LINK_MODE: hardlink
    steps:
      - name: Tune Windows runner for IO-heavy installs
        # Beyond just disabling Defender realtime: also turn off scanning
        # passes that hit on every file write (archive/script/network/IOAV/
        # behavior), set process exclusions for the Python+Node+Electron
        # exes we spawn, set path exclusions for the venvs and pip/uv
        # caches, enable long paths, and exit 0 so individual cmdlet
        # failures don't fail the step.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Try-Run($cmd) { try { & $cmd } catch { Write-Host "  (skip) $($_.Exception.Message)" } }
          Try-Run { Set-MpPreference -DisableRealtimeMonitoring $true }
          Try-Run { Set-MpPreference -DisableArchiveScanning $true }
          Try-Run { Set-MpPreference -DisableScriptScanning $true }
          Try-Run { Set-MpPreference -DisableScanningNetworkFiles $true }
          Try-Run { Set-MpPreference -DisableIOAVProtection $true }
          Try-Run { Set-MpPreference -DisableBehaviorMonitoring $true }
          Try-Run { Set-MpPreference -MAPSReporting 0 }
          Try-Run { Add-MpPreference -ExclusionProcess @('python.exe','pip.exe','uv.exe','node.exe','ComfyUI.exe') }
          Try-Run { Add-MpPreference -ExclusionPath @(
              "$env:USERPROFILE\Documents\ComfyUI",
              "$env:USERPROFILE\.comfy-test-cache",
              "$env:LOCALAPPDATA\pip\Cache",
              "$env:LOCALAPPDATA\uv\cache",
              "${{ github.workspace }}"
          ) }
          # Long-path support so deep node_modules / pixi env paths don't trip MAX_PATH.
          Try-Run { New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name LongPathsEnabled -Value 1 -PropertyType DWORD -Force | Out-Null }
          exit 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install comfy-test
        shell: bash
        run: pip install "comfy-test==${COMFY_TEST_VERSION}"

      - name: Run desktop test (CPU)
        if: ${{ inputs.platform == 'macos-desktop' || inputs.platform == 'windows-desktop' }}
        shell: bash
        run: |
          comfy-test run "https://github.com/${{ inputs.node_repo }}.git" \
            --branch "${{ inputs.branch }}" --desktop

      - name: Run desktop test (GPU)
        if: ${{ inputs.platform == 'windows-desktop-gpu' }}
        shell: bash
        run: |
          comfy-test run "https://github.com/${{ inputs.node_repo }}.git" \
            --branch "${{ inputs.branch }}" --desktop --gpu

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.platform }}
          path: ${{ env.COMFY_TEST_LOGS_DIR }}/
          if-no-files-found: ignore

  # =========================================================================
  # Publish (separate job so a flaky publish can be re-run from the GHA UI
  # without re-running the test job). Downloads the test job's artifact,
  # finds results.json under <run_id>/<branch>/<platform>/, runs
  # `comfy-test publish` to push to <node-repo>:gh-pages/<branch>/<platform>/.
  # =========================================================================
  publish:
    needs: [cpu, gpu, desktop]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install comfy-test
        shell: bash
        run: pip install "comfy-test==${COMFY_TEST_VERSION}"

      - name: Download test artifact
        id: dl
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: results-${{ inputs.platform }}
          path: ./results

      - name: Publish to gh-pages
        if: steps.dl.outcome == 'success'
        shell: bash
        env:
          NODE_PAT: ${{ secrets.NODE_PAT }}
        run: |
          if [ -z "${NODE_PAT:-}" ]; then echo "No NODE_PAT secret; skipping publish."; exit 0; fi
          git config --global user.email "ci@scan2wall.com"
          git config --global user.name "comfy-test"
          git config --global credential.helper store
          echo "https://x-access-token:${NODE_PAT}@github.com" > ~/.git-credentials
          NODE_BASE="${{ inputs.node_repo }}"; SHORT_NAME="${NODE_BASE##*/}"; SHORT_NAME="${SHORT_NAME#ComfyUI-}"
          RESULTS=$(find ./results \
            -path "*/${SHORT_NAME}-*/${{ inputs.branch }}/${{ inputs.platform }}/results.json" \
            2>/dev/null | head -1)
          if [ -z "$RESULTS" ]; then
            echo "No results.json under ./results matching ${SHORT_NAME}-*/${{ inputs.branch }}/${{ inputs.platform }}/. Listing artifact for debug:"
            find ./results -maxdepth 6 -type f 2>/dev/null | head -50
            exit 0
          fi
          echo "Publishing $RESULTS"
          comfy-test publish "$(dirname "$RESULTS")" --repo "${{ inputs.node_repo }}"
