name: Test Windows Desktop

on:
  workflow_call:
    inputs:
      node_repo:
        description: "owner/repo of the node to test"
        type: string
        required: true
      node_branch:
        type: string
        default: "main"
      runs_on:
        type: string
        default: "windows-latest"

jobs:
  windows-desktop-test:
    name: windows-desktop-test
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      COMFY_TEST_GPU: "0"
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}\comfy-test-logs
    steps:

      - name: Resolve target node + run layout
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.node_repo }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            NODE_NAME="${INPUT_REPO##*/}"
          else
            NODE_NAME="${{ github.event.repository.name }}"
          fi
          # Flat layout matching linux-gpu's gh-pages shape. See
          # _test-macos-desktop.yml's equivalent step for full comment.
          LOGS_FWD="${COMFY_TEST_LOGS_DIR//\\//}"
          mkdir -p "$LOGS_FWD/debug" "$LOGS_FWD/logs" \
                   "$LOGS_FWD/screenshots" "$LOGS_FWD/videos"
          : > "$LOGS_FWD/crash_dump.log"
          {
            echo "NODE_NAME=$NODE_NAME"
            echo "DEBUG_ROOT=$LOGS_FWD/debug"
          } >> $GITHUB_ENV

      # --- Download and install desktop app ---
      - name: Download ComfyUI Desktop
        shell: pwsh
        run: |
          $installer = "${{ github.workspace }}\ComfyUI-Setup.exe"
          Invoke-WebRequest -Uri "https://download.comfy.org/windows/nsis/x64" -OutFile $installer -UseBasicParsing
          # Silent install. NSIS on Windows Server 2025 sometimes spawns a child
          # and returns immediately, so we can't rely on -Wait alone.
          $proc = Start-Process -Wait -PassThru -FilePath $installer -ArgumentList '/S'
          Write-Host "Installer exited with code $($proc.ExitCode)"
          $appPath = "$env:LOCALAPPDATA\Programs\ComfyUI"
          for ($i = 0; $i -lt 180; $i++) {
            if (Test-Path "$appPath\ComfyUI.exe") {
              Write-Host "App ready at $appPath after ${i}s"
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not (Test-Path "$appPath\ComfyUI.exe")) {
            Write-Error "Desktop app not found at $appPath after 180s"
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -ErrorAction SilentlyContinue
            Get-ChildItem "C:\Program Files" -Filter "*ComfyUI*" -ErrorAction SilentlyContinue
            exit 1
          }

      # .venv caching disabled. The .venv's python.exe is a symlink to
      # uv's managed-python store at %APPDATA%\uv\python\..., which isn't
      # restored alongside .venv — the restored venv ends up pointing
      # at a missing python and the wizard fails with
      # "Failed to get packages: Exit code 2". Re-enable later by also
      # caching the uv store (~/AppData/Roaming/uv on Windows,
      # ~/Library/Application Support/uv on macOS).

      # --- Background desktop screenshot loop (every 5s) ---
      # Started BEFORE first boot so we capture any maintenance UI / install
      # wizard that's blocking on a "human click" — the most common silent hang
      # on desktop runners. Uses System.Drawing in a detached pwsh process so
      # the loop runs in the SAME interactive session as the runner (Session 0
      # would capture only a black screen).
      - name: Start desktop screenshot loop
        shell: bash
        run: |
          OUT="$DEBUG_ROOT/desktop_capture"
          mkdir -p "$OUT"
          cat > /tmp/screencap.ps1 << 'PSEOF'
          param([string]$OutDir, [int]$Index)
          Add-Type -AssemblyName System.Drawing, System.Windows.Forms
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $ts = [int][double]::Parse((Get-Date -UFormat %s))
          $name = "desktop_{0:D4}_{1}.png" -f $Index, $ts
          $bmp.Save((Join-Path $OutDir $name), [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose()
          PSEOF
          (
            for i in $(seq 0 9999); do
              powershell -NoProfile -ExecutionPolicy Bypass -File /tmp/screencap.ps1 -OutDir "$OUT" -Index $i 2>/dev/null || true
              sleep 5
            done
          ) &
          echo "SCREENCAP_PID=$!" >> $GITHUB_ENV

      # --- First boot: launch app + drive maintenance UI via CDP if needed ---
      # Electron honors --remote-debugging-port=N. We attach Playwright,
      # detect the Maintenance page, click Recreate → wait → Continue, and
      # capture renderer frames at 5fps which ffmpeg assembles into driver.mp4.
      - name: First boot (CDP-driven)
        shell: bash
        env:
          NODE_REPO: ${{ inputs.node_repo }}
          NODE_BRANCH: ${{ inputs.node_branch }}
          # Driver writes results.json + videos/ to COMFY_TEST_LOGS_DIR
          # (default), electron_inspect/ to DEBUG_ROOT.
          COMFY_TEST_DEBUG_DIR: ${{ env.DEBUG_ROOT }}
        run: |
          APP="$LOCALAPPDATA/Programs/ComfyUI/ComfyUI.exe"
          OUT="$DEBUG_ROOT/electron_inspect"
          mkdir -p "$OUT/frames"

          # Drop the CDP driver to /tmp first.
          # Driver script lives at .github/workflows/scripts/cdp_driver.py in the comfy-test repo. We fetch it from main rather than embedding inline because the heredoc exceeded GitHub's 21000-char per-expression limit.

          curl -L -o /tmp/cdp_driver.py https://raw.githubusercontent.com/PozzettiAndrea/comfy-test/main/.github/workflows/scripts/cdp_driver.py

          # Redirect app stdout/stderr to a file. Without this the wizard's
          # uv progress bar (re-prints every ~50ms because there's no TTY)
          # floods the GitHub Actions step log with thousands of useless
          # lines. The same content lands in %APPDATA%\ComfyUI\logs\comfyui.log
          # which we collect into the artifact.
          "$APP" --remote-debugging-port=9222 > "$OUT/electron_stdout.log" 2>&1 &
          echo "App launched with CDP on :9222 (stdout -> electron_stdout.log)"

          # Phase 1: short wait — either /system_stats (pre-seed worked) or CDP
          SHORT=""
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              SHORT=server; break
            fi
            if curl -s http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              SHORT=cdp; break
            fi
            sleep 1
          done
          echo "Phase 1 outcome: ${SHORT:-neither}"

          if [ "$SHORT" = "cdp" ]; then
            pip install --quiet playwright imageio-ffmpeg tomli || pip install playwright imageio-ffmpeg tomli
            # Tee driver stdout to session.log to mirror gpu.
            python /tmp/cdp_driver.py 2>&1 | tee "${COMFY_TEST_LOGS_DIR//\\//}/session.log" || echo "CDP driver had errors; continuing"
          fi

          # Surface the tail of comfyui.log inline so workflow-execution
          # stdout (Manager Install, node imports, prompt errors) is
          # readable in the GH Actions log without unzipping the artifact.
          LOG_DIR="${APPDATA//\\//}/ComfyUI/logs"
          if [ -f "$LOG_DIR/comfyui.log" ]; then
            echo "----- last 200 lines of comfyui.log -----"
            tail -200 "$LOG_DIR/comfyui.log" || true
            echo "----- /comfyui.log tail -----"
          fi

          # Phase 2: long-wait for /system_stats
          echo "Polling /system_stats up to 15min..."
          for i in $(seq 1 900); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if [ $((i % 30)) -eq 0 ]; then echo "still polling... ${i}s"; fi
            sleep 1
          done
          echo "Server failed to start within 15min"
          cat "$USERPROFILE/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -80 || true
          exit 1

      # --- Install node via ComfyUI Manager CLI ---
      # See macOS workflow for the rationale: cm_cli imports from `comfy`,
      # which is the bundled-app source dir, not a site-packages module.
      - name: Install custom node via Manager
        if: false  # disabled while we iterate on the wizard click-through demo
        shell: bash
        run: |
          export PYTHONPATH="$LOCALAPPDATA/Programs/ComfyUI/resources/ComfyUI:$PYTHONPATH"
          VENV="$USERPROFILE/Documents/ComfyUI/.venv/Scripts/python.exe"
          echo "Using Python: $VENV  PYTHONPATH=$PYTHONPATH"
          "$VENV" --version
          "$VENV" -m comfyui_manager.cm_cli install \
            "https://github.com/${{ inputs.node_repo }}.git"

      # --- Restart app for node to load ---
      - name: Restart app
        if: false
        shell: bash
        run: |
          taskkill //F //IM ComfyUI.exe 2>/dev/null || true
          sleep 5
          APP="$LOCALAPPDATA/Programs/ComfyUI/ComfyUI.exe"
          "$APP" &
          echo "Waiting for server after restart..."
          for i in $(seq 1 180); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after restart (${i}s)"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/system_stats || {
            echo "Server failed to start after restart"
            cat "$USERPROFILE/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -50
            exit 1
          }

      # --- Install comfy-test and run ---
      - name: Install comfy-test
        if: false
        run: pip install comfy-test

      - name: Run tests
        if: false
        shell: bash
        run: |
          git clone --depth 1 -b ${{ inputs.node_branch }} \
            "https://github.com/${{ inputs.node_repo }}.git" node_source
          cd node_source
          python -m comfy_test run --server-url http://127.0.0.1:8000

      # --- Cleanup ---
      - name: Stop desktop screenshot loop + finalize "system" card
        if: always()
        shell: bash
        run: |
          kill $SCREENCAP_PID 2>/dev/null || true
          LOGS_FWD="${COMFY_TEST_LOGS_DIR//\\//}"
          LATEST=$(ls -1t "$DEBUG_ROOT/desktop_capture/"*.png 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            mkdir -p "$LOGS_FWD/screenshots"
            cp "$LATEST" "$LOGS_FWD/screenshots/system_executed.png"
          fi
          python -c "
          import json, os, pathlib
          p = pathlib.Path(os.environ['COMFY_TEST_LOGS_DIR'].replace('\\\\','/')) / 'results.json'
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          data.setdefault('workflows', []).insert(0, {
              'name': 'system', 'status': 'pass',
              'duration_seconds': 0, 'error': None,
              'hardware': data.get('hardware'),
          })
          p.write_text(json.dumps(data, indent=2))
          " || true

      - name: Stop app
        if: always()
        shell: bash
        run: taskkill //F //IM ComfyUI.exe 2>/dev/null || true

      - name: Collect + merge ComfyUI app logs
        if: always()
        shell: bash
        run: |
          # ComfyUI Desktop's Electron `app.getPath('logs')` resolves to
          # %APPDATA%\ComfyUI\logs\ on Windows. comfyui.log is the server
          # stdout pipe (where Manager Install messages land); main.log is
          # the Electron main process.
          OUT="${COMFY_TEST_LOGS_DIR//\\//}/logs"
          mkdir -p "$OUT"
          SRC="${APPDATA//\\//}/ComfyUI/logs"
          if [ -d "$SRC" ]; then
            find "$SRC" -maxdepth 2 -type f -name "*.log" -exec cp -v {} "$OUT/" \; 2>/dev/null || true
          fi
          # Merge chronologically — html_report serves logs/<name>.log
          # under each workflow card, so logs/system.log shows up under
          # the 'system' card on the per-platform page.
          curl -L -o /tmp/merge_logs.py https://raw.githubusercontent.com/PozzettiAndrea/comfy-test/main/.github/workflows/scripts/merge_logs.py
          python /tmp/merge_logs.py "$OUT" || true
          echo "--- collected ---"
          ls -la "$OUT" || true

      - name: Generate per-platform index.html
        if: always()
        shell: bash
        run: |
          VERSION="${GITHUB_WORKFLOW_REF##*@refs/tags/v}"
          if [ "$VERSION" = "$GITHUB_WORKFLOW_REF" ]; then VERSION=""; fi
          if [ -n "$VERSION" ]; then
            pip install --quiet "comfy-test==$VERSION" || pip install --quiet comfy-test
          else
            pip install --quiet comfy-test
          fi
          python -c "
          import os
          from pathlib import Path
          from comfy_test.reporting.html_report import generate_html_report
          generate_html_report(Path(os.environ['COMFY_TEST_LOGS_DIR'].replace('\\\\','/')),
                               repo_name=os.environ.get('NODE_REPO', os.environ.get('NODE_NAME', '')),
                               current_platform='windows-desktop')
          " || echo "index.html generation failed (non-fatal)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-windows-desktop
          path: ${{ env.COMFY_TEST_LOGS_DIR }}\
          if-no-files-found: ignore
          include-hidden-files: true
