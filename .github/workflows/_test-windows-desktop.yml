name: Test Windows Desktop

on:
  workflow_call:
    inputs:
      node_repo:
        description: "owner/repo of the node to test"
        type: string
        required: true
      node_branch:
        type: string
        default: "main"
      runs_on:
        type: string
        default: "windows-latest"

jobs:
  windows-desktop-test:
    name: windows-desktop-test
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      COMFY_TEST_GPU: "0"
      COMFY_TEST_LOGS_DIR: ${{ github.workspace }}\comfy-test-logs
    steps:

      - name: Resolve target node
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.node_repo }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            echo "NODE_NAME=${INPUT_REPO##*/}" >> $GITHUB_ENV
          else
            echo "NODE_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          fi
          mkdir -p "${COMFY_TEST_LOGS_DIR//\\//}"

      # --- Download and install desktop app ---
      - name: Download ComfyUI Desktop
        shell: pwsh
        run: |
          $installer = "${{ github.workspace }}\ComfyUI-Setup.exe"
          Invoke-WebRequest -Uri "https://download.comfy.org/windows/nsis/x64" -OutFile $installer -UseBasicParsing
          # Silent install. NSIS on Windows Server 2025 sometimes spawns a child
          # and returns immediately, so we can't rely on -Wait alone.
          $proc = Start-Process -Wait -PassThru -FilePath $installer -ArgumentList '/S'
          Write-Host "Installer exited with code $($proc.ExitCode)"
          $appPath = "$env:LOCALAPPDATA\Programs\ComfyUI"
          for ($i = 0; $i -lt 180; $i++) {
            if (Test-Path "$appPath\ComfyUI.exe") {
              Write-Host "App ready at $appPath after ${i}s"
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not (Test-Path "$appPath\ComfyUI.exe")) {
            Write-Error "Desktop app not found at $appPath after 180s"
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -ErrorAction SilentlyContinue
            Get-ChildItem "C:\Program Files" -Filter "*ComfyUI*" -ErrorAction SilentlyContinue
            exit 1
          }

      # Cache the venv so subsequent runs skip the ~6-8 min Python + 80
      # package install. Keyed on OS only — on a stale cache vs a new
      # ComfyUI Desktop release, the wizard's validator will reject and
      # the CDP driver falls back to the Recreate maintenance flow.
      - name: Cache ComfyUI Desktop venv
        uses: actions/cache@v4
        with:
          path: ~/Documents/ComfyUI/.venv
          key: comfyui-desktop-venv-${{ runner.os }}-v2

      # --- Background desktop screenshot loop (every 5s) ---
      # Started BEFORE first boot so we capture any maintenance UI / install
      # wizard that's blocking on a "human click" — the most common silent hang
      # on desktop runners. Uses System.Drawing in a detached pwsh process so
      # the loop runs in the SAME interactive session as the runner (Session 0
      # would capture only a black screen).
      - name: Start desktop screenshot loop
        shell: bash
        run: |
          OUT="${COMFY_TEST_LOGS_DIR//\\//}/desktop_capture"
          mkdir -p "$OUT"
          cat > /tmp/screencap.ps1 << 'PSEOF'
          param([string]$OutDir, [int]$Index)
          Add-Type -AssemblyName System.Drawing, System.Windows.Forms
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $ts = [int][double]::Parse((Get-Date -UFormat %s))
          $name = "desktop_{0:D4}_{1}.png" -f $Index, $ts
          $bmp.Save((Join-Path $OutDir $name), [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose()
          PSEOF
          (
            for i in $(seq 0 9999); do
              powershell -NoProfile -ExecutionPolicy Bypass -File /tmp/screencap.ps1 -OutDir "$OUT" -Index $i 2>/dev/null || true
              sleep 5
            done
          ) &
          echo "SCREENCAP_PID=$!" >> $GITHUB_ENV

      # --- First boot: launch app + drive maintenance UI via CDP if needed ---
      # Electron honors --remote-debugging-port=N. We attach Playwright,
      # detect the Maintenance page, click Recreate → wait → Continue, and
      # capture renderer frames at 5fps which ffmpeg assembles into driver.mp4.
      - name: First boot (CDP-driven)
        shell: bash
        run: |
          APP="$LOCALAPPDATA/Programs/ComfyUI/ComfyUI.exe"
          OUT="${COMFY_TEST_LOGS_DIR//\\//}/electron_inspect"
          mkdir -p "$OUT/frames"

          # Drop the CDP driver to /tmp first.
          cat > /tmp/cdp_driver.py <<'PY'
          import json, os, subprocess, sys, time, urllib.request
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          t0 = time.time()
          import builtins as _b
          def log(*a, **k):
              _b.print(f'[{int(time.time()-t0):4d}s]', *a, **k, flush=True)

          OUT = Path(os.environ['COMFY_TEST_LOGS_DIR'].replace('\\', '/')) / 'electron_inspect'
          FRAMES = OUT / 'frames'
          OUT.mkdir(parents=True, exist_ok=True)
          FRAMES.mkdir(parents=True, exist_ok=True)
          fi = [0]

          def snap(page, name):
              try:
                  page.screenshot(path=str(OUT / f'{name}.png'), full_page=True)
                  (OUT / f'{name}.html').write_text(page.content(), encoding='utf-8')
              except Exception as e:
                  log(f'  snap {name}: {e}')

          def frame(page):
              try:
                  fi[0] += 1
                  page.screenshot(path=str(FRAMES / f'frame_{fi[0]:06d}.png'))
              except Exception:
                  pass

          def sleep_capturing(page, seconds, fps=5):
              interval = 1.0 / fps
              end = time.time() + seconds
              while time.time() < end:
                  frame(page)
                  time.sleep(interval)

          def buttons(page):
              try:
                  return page.eval_on_selector_all(
                      'button, a[role=button], [role=button], input[type=submit], input[type=button]',
                      "els => els.map(e => ({text:(e.innerText||e.value||'').trim(), tag:e.tagName, id:e.id, cls:e.className, disabled:!!(e.disabled||e.getAttribute('aria-disabled')==='true'||e.getAttribute('disabled')!==null)}))"
                  )
              except Exception:
                  return []

          def main_page(browser):
              cands = []
              for ctx in browser.contexts:
                  for pg in ctx.pages:
                      try:
                          u = pg.url or ''
                          if u.startswith('devtools://'):
                              continue
                          t = pg.title()
                      except Exception:
                          continue
                      cands.append((pg, u, t))
              for pg, u, t in cands:
                  if any(k in (t or '') for k in ('ComfyUI', 'Maintenance')) or 'maintenance' in (u or '').lower():
                      return pg
              return cands[0][0] if cands else None

          try:
              tg = json.loads(urllib.request.urlopen('http://localhost:9222/json').read())
              (OUT / 'targets.json').write_text(json.dumps(tg, indent=2))
              log(f'CDP targets: {len(tg)}')
              for t in tg:
                  log(f"  {t.get('type')}: {t.get('url')} | {t.get('title')}")
          except Exception as e:
              log(f'targets list: {e}')

          # Visible cursor injected into the page so the captured video shows
          # where the driver clicks. The CSS transform transitions over 300ms,
          # so move-then-wait-then-click looks like a smooth pointer move.
          CURSOR_JS = r'''
          (() => {
            if (document.getElementById('__fake_cursor')) return;
            const c = document.createElement('div');
            c.id = '__fake_cursor';
            c.style.cssText = [
              'position:fixed','top:0','left:0','width:28px','height:28px',
              'pointer-events:none','z-index:2147483647',
              'transition:transform 300ms cubic-bezier(.4,0,.2,1),filter 120ms',
              'transform:translate(40px,40px)',
              "background:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 2 L3 19 L8 14 L11 21 L14 20 L11 13 L18 13 Z' fill='black' stroke='white' stroke-width='1.5'/></svg>\") no-repeat center / contain"
            ].join(';');
            document.documentElement.appendChild(c);
            window.__moveCursor = (x, y) => { c.style.transform = `translate(${x}px,${y}px)`; };
            window.__clickFlash  = () => { c.style.filter = 'drop-shadow(0 0 8px #4af) brightness(1.4)'; setTimeout(()=>c.style.filter='',180); };
          })();
          '''

          def install_cursor(page):
              try:
                  page.evaluate(CURSOR_JS)
              except Exception as e:
                  log(f'  cursor inject failed: {e}')

          def click_with_cursor(page, loc):
              try:
                  box = loc.bounding_box()
                  if box:
                      cx = box['x'] + box['width']/2
                      cy = box['y'] + box['height']/2
                      page.evaluate(f'window.__moveCursor && window.__moveCursor({cx}, {cy})')
                      time.sleep(0.4)
                      page.evaluate('window.__clickFlash && window.__clickFlash()')
              except Exception:
                  pass
              loc.click(timeout=3000)

          def fill_with_cursor(page, sel, text):
              loc = page.locator(sel).first
              if not loc.count() or not loc.is_visible():
                  return False
              try:
                  box = loc.bounding_box()
                  if box:
                      cx = box['x'] + box['width']/2
                      cy = box['y'] + box['height']/2
                      page.evaluate(f'window.__moveCursor && window.__moveCursor({cx}, {cy})')
                      time.sleep(0.4)
              except Exception:
                  pass
              try:
                  loc.click(timeout=3000)
                  loc.fill('')
                  loc.type(text, delay=80)
                  return True
              except Exception:
                  return False

          with sync_playwright() as p:
              browser = p.chromium.connect_over_cdp('http://localhost:9222')
              page = main_page(browser)
              if not page:
                  log('No usable page')
                  sys.exit(0)
              log(f'Main page: {page.url} | {page.title()}')
              install_cursor(page)
              snap(page, 'initial')
              btns = buttons(page)
              (OUT / 'initial_buttons.json').write_text(json.dumps(btns, indent=2))
              log(f"Buttons: {[b['text'] for b in btns]}")
              frame(page)

              # Click-through wizard loop. We don't pre-seed any config, so the
              # app boots into the welcome → GPU → path → install → telemetry
              # consent flow. We poll /system_stats; meanwhile we click whatever
              # primary action is on screen, in priority order: confirm popover
              # accept > raised button with a known label > any button with that
              # label. We track signatures so the same button on the same URL
              # only gets clicked once; URL changes reset the set.
              PRIMARY_LABELS = ['Get Started', 'Next', 'Continue', 'Install', 'OK',
                                'Recreate', 'Confirm', 'Accept', 'Allow', 'Yes', 'Finish']

              def server_up():
                  try:
                      urllib.request.urlopen('http://127.0.0.1:8000/system_stats', timeout=2)
                      return True
                  except Exception:
                      return False

              def find_action(page):
                  # Confirm popover (e.g., "Delete .venv" → Recreate accept)
                  try:
                      loc = page.locator('button.p-confirmpopup-accept-button').first
                      if loc.count() and loc.is_visible():
                          return ('confirm', loc, f'CONFIRM|{(loc.text_content() or "").strip()}')
                  except Exception:
                      pass
                  # Exact-text primary buttons (exclude hardware tiles, must be visible+enabled).
                  # :text-is is exact match; :has-text is substring (catches tiles by accident).
                  for label in PRIMARY_LABELS:
                      for sel in (f'button.p-button-raised:text-is("{label}")',
                                  f'button:not(.hardware-option):text-is("{label}")',
                                  f'button[aria-label="{label}"]:not(.hardware-option)'):
                          try:
                              loc = page.locator(sel).first
                              if loc.count() and loc.is_visible() and not loc.is_disabled():
                                  return ('btn', loc, f'BTN|{label}')
                          except Exception:
                              pass
                  # Hardware-tile fallback: GPU picker disables the bottom Install
                  # button until a tile is clicked. Order matters: macOS-friendly
                  # tiles first so Apple Silicon wins on macOS; Windows runners
                  # have no GPU and fall through to CPU (NVIDIA-default would
                  # install cu130 torch which crashes at startup on a CPU box).
                  PREFERRED = ['Apple Silicon', 'MPS', 'M1', 'M2', 'M3', 'M4', 'CPU']
                  for pref in PREFERRED:
                      try:
                          tile = page.locator(f'button.hardware-option:has-text("{pref}")').first
                          if tile.count() and tile.is_visible():
                              return ('tile', tile, f'TILE|{pref}')
                      except Exception:
                          pass
                  try:
                      tile = page.locator('button.hardware-option:not([aria-disabled="true"])').first
                      if tile.count() and tile.is_visible():
                          name = (tile.get_attribute('aria-label') or tile.text_content() or 'tile').strip()[:40]
                          return ('tile', tile, f'TILE|{name}')
                  except Exception:
                      pass
                  return None

              clicked = {}  # sig -> last_click_time; allow re-click after CLICK_TTL
              CLICK_TTL = 5
              page_url = page.url
              start = time.time()
              deadline = start + 1500  # 25min cap
              while time.time() < deadline:
                  frame(page)
                  if server_up():
                      log(f'  /system_stats up after {int(time.time()-start)}s')
                      break
                  new_url = page.url
                  if new_url != page_url:
                      log(f'  url: {page_url} -> {new_url}')
                      page_url = new_url
                      clicked.clear()
                      install_cursor(page)  # SPA routes may rebuild DOM
                  found = find_action(page)
                  if found:
                      kind, loc, sig = found
                      last_t = clicked.get(sig, 0)
                      if time.time() - last_t < CLICK_TTL:
                          time.sleep(1); continue
                      try:
                          click_with_cursor(page, loc)
                          log(f'  clicked [{sig}]')
                          clicked[sig] = time.time()
                          sleep_capturing(page, 1, fps=4)
                      except Exception as e:
                          log(f'  click [{sig}] failed: {e}')
                          clicked[sig] = time.time()
                  else:
                      time.sleep(2)
              else:
                  log(f'  driver timed out after {int(time.time()-start)}s without /system_stats')

              # Keep capturing past server-up so the main canvas/UI lands in
              # the video, then drive a short post-flow: dismiss the cloud
              # upsell, close the workflow templates dialog, open Extensions.
              # Each step tolerates the element not being there (Windows for
              # example skips the cloud upsell).
              log('  capturing canvas load...')
              sleep_capturing(page, 8, fps=5)
              # :visible pseudo-class excludes hidden buttons. There are
              # several `aria-label="Close"` X icons in the page (sidebar
              # accordion items render hidden ones); without :visible the
              # `.first` would pick a hidden one and the click is a no-op.
              POST_ACTIONS = [
                  ('Continue Locally',  'button:has-text("Continue Locally"):visible'),
                  ('Close Templates',   'button[aria-label="Close"]:visible'),
                  ('Extensions',        'button[aria-label="Extensions"]:visible'),
              ]
              for name, sel in POST_ACTIONS:
                  log(f'  post: waiting for {name}')
                  deadline = time.time() + 8
                  hit = False
                  while time.time() < deadline:
                      try:
                          loc = page.locator(sel).first
                          if loc.count() and loc.is_visible() and not loc.is_disabled():
                              click_with_cursor(page, loc)
                              log(f'  post: clicked {name}')
                              sleep_capturing(page, 2, fps=5)
                              hit = True
                              break
                      except Exception:
                          pass
                      sleep_capturing(page, 0.5, fps=5)
                  if not hit:
                      log(f'  post: {name} not found, skipping')
                      if name == 'Close Templates':
                          try:
                              page.keyboard.press('Escape')
                              log('  post: pressed Escape (Templates fallback)')
                              sleep_capturing(page, 2, fps=5)
                          except Exception:
                              pass

              # Extensions search → pick tile → choose Latest → Install.
              # Hard-coded to SAM3/pznodes while we iterate; generalizing to
              # parse pyproject.toml from inputs.node_repo is out of scope.
              NODE_DISPLAY_NAME = 'SAM3'
              PUBLISHER = 'pznodes'
              sleep_capturing(page, 3, fps=5)
              log(f'  ext: searching "{NODE_DISPLAY_NAME}"')
              fill_with_cursor(page, 'input[placeholder="Search"]:visible', NODE_DISPLAY_NAME)
              sleep_capturing(page, 2, fps=5)

              log(f'  ext: clicking {PUBLISHER} tile')
              tile_sel = f'div.bg-modal-card-background.cursor-pointer:has-text("{PUBLISHER}"):visible'
              deadline = time.time() + 8
              clicked_tile = False
              while time.time() < deadline:
                  try:
                      tile = page.locator(tile_sel).first
                      if tile.count() and tile.is_visible():
                          click_with_cursor(page, tile)
                          clicked_tile = True
                          break
                  except Exception:
                      pass
                  sleep_capturing(page, 0.5, fps=5)
              if not clicked_tile:
                  log('  ext: tile not found, ending capture')
              else:
                  sleep_capturing(page, 2, fps=5)
                  log('  ext: opening version dropdown')
                  try:
                      dd = page.locator('button[aria-label="Single-select dropdown"]:visible').first
                      if dd.count():
                          click_with_cursor(page, dd)
                          sleep_capturing(page, 1, fps=5)
                          latest = page.locator('[role="option"]:has-text("Latest"):visible').first
                          if latest.count():
                              click_with_cursor(page, latest)
                              log('  ext: selected Latest')
                              sleep_capturing(page, 1, fps=5)
                  except Exception as e:
                      log(f'  ext: version dropdown failed: {e}')

                  log('  ext: clicking Install')
                  try:
                      btn = page.locator('button[is-installing="false"]:visible').first
                      if btn.count():
                          click_with_cursor(page, btn)
                          log('  ext: clicked Install')
                  except Exception as e:
                      log(f'  ext: install click failed: {e}')
                  sleep_capturing(page, 8, fps=5)

              snap(page, 'final')
              log(f'Captured {fi[0]} frames')
              browser.close()

          # imageio-ffmpeg ships a static ffmpeg binary so we don't need a system install.
          try:
              import imageio_ffmpeg
              ffmpeg_exe = imageio_ffmpeg.get_ffmpeg_exe()
          except Exception as e:
              log(f'imageio-ffmpeg unavailable ({e}); falling back to PATH ffmpeg')
              ffmpeg_exe = 'ffmpeg'

          mp4 = OUT / 'driver.mp4'
          try:
              subprocess.run([
                  ffmpeg_exe, '-y', '-framerate', '5',
                  '-i', str(FRAMES / 'frame_%06d.png'),
                  '-c:v', 'libx264', '-pix_fmt', 'yuv420p',
                  '-vf', 'pad=ceil(iw/2)*2:ceil(ih/2)*2',
                  str(mp4),
              ], check=True)
              log(f'Wrote {mp4}')
          except Exception as e:
              log(f'ffmpeg failed: {e}')
          PY

          "$APP" --remote-debugging-port=9222 &
          echo "App launched with CDP on :9222"

          # Phase 1: short wait — either /system_stats (pre-seed worked) or CDP
          SHORT=""
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              SHORT=server; break
            fi
            if curl -s http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              SHORT=cdp; break
            fi
            sleep 1
          done
          echo "Phase 1 outcome: ${SHORT:-neither}"

          if [ "$SHORT" = "cdp" ]; then
            pip install --quiet playwright imageio-ffmpeg || pip install playwright imageio-ffmpeg
            python /tmp/cdp_driver.py || echo "CDP driver had errors; continuing"
          fi

          # Phase 2: long-wait for /system_stats
          echo "Polling /system_stats up to 15min..."
          for i in $(seq 1 900); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if [ $((i % 30)) -eq 0 ]; then echo "still polling... ${i}s"; fi
            sleep 1
          done
          echo "Server failed to start within 15min"
          cat "$USERPROFILE/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -80 || true
          exit 1

      # --- Install node via ComfyUI Manager CLI ---
      # See macOS workflow for the rationale: cm_cli imports from `comfy`,
      # which is the bundled-app source dir, not a site-packages module.
      - name: Install custom node via Manager
        if: false  # disabled while we iterate on the wizard click-through demo
        shell: bash
        run: |
          export PYTHONPATH="$LOCALAPPDATA/Programs/ComfyUI/resources/ComfyUI:$PYTHONPATH"
          VENV="$USERPROFILE/Documents/ComfyUI/.venv/Scripts/python.exe"
          echo "Using Python: $VENV  PYTHONPATH=$PYTHONPATH"
          "$VENV" --version
          "$VENV" -m comfyui_manager.cm_cli install \
            "https://github.com/${{ inputs.node_repo }}.git"

      # --- Restart app for node to load ---
      - name: Restart app
        if: false
        shell: bash
        run: |
          taskkill //F //IM ComfyUI.exe 2>/dev/null || true
          sleep 5
          APP="$LOCALAPPDATA/Programs/ComfyUI/ComfyUI.exe"
          "$APP" &
          echo "Waiting for server after restart..."
          for i in $(seq 1 180); do
            if curl -s http://127.0.0.1:8000/system_stats > /dev/null 2>&1; then
              echo "Server ready after restart (${i}s)"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/system_stats || {
            echo "Server failed to start after restart"
            cat "$USERPROFILE/Documents/ComfyUI/user/comfyui.log" 2>/dev/null | tail -50
            exit 1
          }

      # --- Install comfy-test and run ---
      - name: Install comfy-test
        if: false
        run: pip install comfy-test

      - name: Run tests
        if: false
        shell: bash
        run: |
          git clone --depth 1 -b ${{ inputs.node_branch }} \
            "https://github.com/${{ inputs.node_repo }}.git" node_source
          cd node_source
          python -m comfy_test run --server-url http://127.0.0.1:8000

      # --- Cleanup ---
      - name: Stop desktop screenshot loop + finalize "system" card
        if: always()
        shell: bash
        run: |
          kill $SCREENCAP_PID 2>/dev/null || true
          OUT="${COMFY_TEST_LOGS_DIR//\\//}"
          LATEST=$(ls -1t "$OUT/desktop_capture/"*.png 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            mkdir -p "$OUT/screenshots"
            cp "$LATEST" "$OUT/screenshots/system_executed.png"
          fi
          python -c "
          import json, os, pathlib
          p = pathlib.Path(os.environ['COMFY_TEST_LOGS_DIR'].replace('\\\\','/')) / 'results.json'
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          data.setdefault('workflows', []).insert(0, {
              'name': 'system', 'status': 'pass',
              'duration_seconds': 0, 'error': None,
              'hardware': data.get('hardware'),
          })
          p.write_text(json.dumps(data, indent=2))
          " || true

      - name: Stop app
        if: always()
        shell: bash
        run: taskkill //F //IM ComfyUI.exe 2>/dev/null || true

      - name: Collect ComfyUI app log
        if: always()
        shell: bash
        run: |
          # ComfyUI Desktop's Electron `app.getPath('logs')` resolves to
          # %APPDATA%\ComfyUI\logs\ on Windows. comfyui.log is the server
          # stdout pipe (where Manager Install messages land); main.log is
          # the Electron main process.
          OUT="${COMFY_TEST_LOGS_DIR//\\//}/comfy_logs"
          mkdir -p "$OUT"
          SRC="${APPDATA//\\//}/ComfyUI/logs"
          if [ -d "$SRC" ]; then
            find "$SRC" -maxdepth 2 -type f -name "*.log" -exec cp -v {} "$OUT/" \; 2>/dev/null || true
          fi
          echo "--- collected ---"
          ls -la "$OUT" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-windows-desktop
          path: ${{ env.COMFY_TEST_LOGS_DIR }}\
          if-no-files-found: ignore
          include-hidden-files: true
